name: Build

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]

env:
  PYTHONUTF8: 1
  UV_VERSION: ${{ vars.UV_VERSION }}
  TARGET_PYTHON: ${{ vars.TARGET_PYTHON }}

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate required workflow variables
        run: |
          test -n "${UV_VERSION}" || { echo "UV_VERSION is not set"; exit 1; }
          test -n "${TARGET_PYTHON}" || { echo "TARGET_PYTHON is not set"; exit 1; }

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python ${{ env.TARGET_PYTHON }}
        uses: actions/setup-python@v5
        with:
            python-version: ${{ env.TARGET_PYTHON }}

      - name: Install uv ${{ env.UV_VERSION }}
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install all dependencies
        run: uv sync --all-groups

      - name: Build release distributions
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  acceptance:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: build
    steps:

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install uv ${{ env.UV_VERSION }}
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install all dependencies
        run: uv sync --group test --no-install-project

      - name: Download release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Install release distributions
        run: |
          ls -lah dist
          test -n "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          uv pip install dist/*.whl

      - name: Run acceptance tests
        run: uv run pytest tests/acceptance
    
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: release
    needs: acceptance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check if version should be released
        id: release_check
        shell: bash
        run: |
          current_version="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"
          echo "current_version=${current_version}" >> "$GITHUB_OUTPUT"

          http_status=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/aqt-connector/${current_version}/json")

          if [ "$http_status" = "200" ]; then
            echo "::notice::Version ${current_version} is already published on PyPI. Skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          elif [ "$http_status" = "404" ]; then
            echo "Version ${current_version} is not yet on PyPI. Proceeding with release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unexpected HTTP status ${http_status} when checking PyPI for version ${current_version}."
            exit 1
          fi

      - name: Download release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/
      
      - name: Publish to PyPI
        if: steps.release_check.outputs.should_release == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create git tag and GitHub release
        if: steps.release_check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${{ steps.release_check.outputs.current_version }}"
          tag="v${version}"
          
          # Create and push the tag
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"
          
          # Create GitHub release
          gh release create "${tag}" \
            --title "${tag}" \
            --notes "Release of version ${version}" \
            dist/*
